<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在開啟...</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f0f2f5;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1c1e21;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 40px 32px;
        max-width: 360px;
        width: 90%;
        text-align: center;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      .app-icon {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #1877f2;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app-icon svg {
        width: 44px;
        height: 44px;
        fill: #fff;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      #status {
        font-size: 14px;
        color: #65676b;
        min-height: 20px;
        margin-bottom: 24px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid #e4e6eb;
        border-top-color: #1877f2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 24px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn {
        display: inline-block;
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }

      .btn:active {
        opacity: 0.85;
      }

      .btn-primary {
        background: #1877f2;
        color: #fff;
      }

      .btn-secondary {
        background: #e4e6eb;
        color: #1c1e21;
        margin-top: 10px;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="app-icon">
        <!-- Facebook "f" logo -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z" />
        </svg>
      </div>

      <h1>開啟 Facebook</h1>
      <p id="status">正在偵測您的裝置...</p>
      <div class="spinner" id="spinner"></div>

      <div class="actions hidden" id="actions">
        <a class="btn btn-primary hidden" id="open-app-btn" href="#">開啟 App</a>
        <a class="btn btn-secondary hidden" id="open-web-btn" href="#" target="_blank" rel="noopener noreferrer">在瀏覽器中開啟</a>
        <a class="btn btn-secondary hidden" id="store-btn" href="#" target="_blank" rel="noopener noreferrer">前往下載</a>
      </div>
    </div>

    <script>
      const PLAY_STORE =
        "https://play.google.com/store/apps/details?id=com.facebook.katana";
      const APP_STORE =
        "https://apps.apple.com/app/facebook/id284882215";

      // ─── DOM refs ─────────────────────────────────────────────────
      const statusEl = document.getElementById("status");
      const spinnerEl = document.getElementById("spinner");
      const actionsEl = document.getElementById("actions");
      const openAppBtn = document.getElementById("open-app-btn");
      const openWebBtn = document.getElementById("open-web-btn");
      const storeBtn = document.getElementById("store-btn");
      const RESERVED_PATHS = new Set([
        "about",
        "ads",
        "business",
        "events",
        "gaming",
        "groups",
        "hashtag",
        "help",
        "login",
        "marketplace",
        "messages",
        "pages",
        "people",
        "permalink.php",
        "photo",
        "photos",
        "plugins",
        "post",
        "posts",
        "profile.php",
        "reel",
        "reels",
        "search",
        "settings",
        "share",
        "sharer",
        "stories",
        "story.php",
        "video.php",
        "videos",
        "watch",
      ]);

      // ─── URL 解析（唯一需要 try-catch 的部分）────────────────────
      function parseTargetUrl() {
        try {
          const raw = new URLSearchParams(window.location.search).get("url");
          if (!raw) return null;
          const { hostname } = new URL(raw);
          const normalizedHost = hostname.replace(/^www\./, "").toLowerCase();
          if (!["facebook.com", "m.facebook.com"].includes(normalizedHost)) return null;
          return raw;
        } catch {
          return null;
        }
      }

      function showActions({ message, appHref, storeHref, webUrl }) {
        spinnerEl.classList.add("hidden");
        statusEl.textContent = message;
        actionsEl.classList.remove("hidden");
        openAppBtn.classList.add("hidden");
        openWebBtn.classList.add("hidden");
        storeBtn.classList.add("hidden");
        if (appHref) {
          openAppBtn.href = appHref;
          openAppBtn.classList.remove("hidden");
        }
        if (webUrl) {
          openWebBtn.href = webUrl;
          openWebBtn.classList.remove("hidden");
        }
        if (storeHref) {
          storeBtn.href = storeHref;
          storeBtn.classList.remove("hidden");
        }
      }

      function extractFacebookProfileRef(rawUrl) {
        try {
          const parsed = new URL(rawUrl);
          const pathSegments = parsed.pathname.split("/").filter(Boolean);
          const firstSegment = pathSegments[0] || "";
          const profileId = parsed.searchParams.get("id");

          if (firstSegment === "profile.php" && profileId) {
            return profileId;
          }

          if (
            firstSegment === "people" &&
            pathSegments.length >= 3 &&
            /^\d+$/.test(pathSegments[2])
          ) {
            return pathSegments[2];
          }

          if (firstSegment === "pages") {
            const numericSegment = pathSegments.find((segment) => /^\d+$/.test(segment));
            if (numericSegment) return numericSegment;
          }

          if (/^\d+$/.test(firstSegment)) {
            return firstSegment;
          }

          return null;
        } catch {
          return null;
        }
      }

      function buildIosDeepLink(rawUrl) {
        const profileRef = extractFacebookProfileRef(rawUrl);
        if (!profileRef) return null;
        return `fb://profile?id=${encodeURIComponent(profileRef)}`;
      }

      // ─── 主流程 ──────────────────────────────────────────────────
      const webUrl = parseTargetUrl();

      if (!webUrl) {
        showActions({ message: "無效或缺少目標網址", webUrl: "https://www.facebook.com" });
      } else {
        const encoded = encodeURIComponent(webUrl);
        const iosDeepLink = buildIosDeepLink(webUrl);
        const androidIntentLink = [
          `intent://facewebmodal/f?href=${encoded}`,
          `#Intent`,
          `scheme=fb`,
          `package=com.facebook.katana`,
          `S.browser_fallback_url=${encodeURIComponent(PLAY_STORE)}`,
          `end`,
        ].join(";");

        const ua = navigator.userAgent;
        const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        const isAndroid = /Android/.test(ua);

        if (isAndroid) {
          statusEl.textContent = "正在開啟 Facebook App...";
          window.location.href = androidIntentLink;

          // 某些 WebView 攔截 intent://，備用 UI
          setTimeout(() => {
            showActions({
              message: "無法自動開啟，請手動操作",
              appHref: androidIntentLink,
              storeHref: PLAY_STORE,
              webUrl,
            });
          }, 2500);
        } else if (isIOS) {
          if (!iosDeepLink) {
            showActions({
              message: "此 Facebook 連結無法穩定直接導入 App，請改用瀏覽器開啟",
              storeHref: APP_STORE,
              webUrl,
            });
          } else {
            // iOS 14+：window.location 在非 user gesture context 觸發 custom scheme 會被 Safari 封鎖
            // 改為先渲染按鈕，由 <a> click（user gesture）觸發 deep link
            statusEl.textContent = "點擊下方按鈕以開啟 App";
            showActions({
              message: "點擊下方按鈕以開啟 App",
              appHref: iosDeepLink,
              storeHref: APP_STORE,
              webUrl,
            });

            // 同時用 hidden anchor click 嘗試自動觸發（部分情境有效）
            const anchor = document.createElement("a");
            anchor.href = iosDeepLink;
            anchor.style.display = "none";
            document.body.appendChild(anchor);

            let appOpened = false;
            const onHide = () => { appOpened = true; };
            document.addEventListener("visibilitychange", onHide);
            window.addEventListener("pagehide", onHide);

            anchor.click();
            document.body.removeChild(anchor);

            setTimeout(() => {
              document.removeEventListener("visibilitychange", onHide);
              // App 已成功開啟，不做任何事
              if (appOpened || document.hidden) return;
              // 未開啟：按鈕 UI 已在畫面上，更新 status 提示即可
              statusEl.textContent = "App 未能自動開啟，請手動點擊";
            }, 1800);
          }
        } else {
          // Desktop
          window.location.href = webUrl;
        }
      }
    </script>
  </body>
</html>
